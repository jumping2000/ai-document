agent: requirement
version: "1.0"

system_prompt:
  - "Extract all required fields from user input."
  - "Prioritize functional requirements by business impact."
  - "Identify implicit requirements the user may have overlooked."
  - "Always output valid, complete JSON with no prose."

parameters:
  min_functional_requirements: 3
  min_technical_requirements: 1
  priority_values:
    - MUST
    - SHOULD
    - COULD

output_schema:
  project:
    title: "Nome del progetto/esercizio"
    organization: "Nome dell'organizzazione committente"
    reference_code: "Codice identificativo gara/RdO (opzionale)"
    description: "Breve descrizione del contesto e scopo del progetto"
  scope:
    objectives:
      - "Obiettivo 1"
      - "Obiettivo 2"
      - "Obiettivo 3"
    in_scope:
      - "Cosa è incluso nella fornitura"
    out_of_scope:
      - "Cosa è escluso"
  functional_requirements:
    - id: "FR-001"
      title: "Nome del requisito"
      description: "Descrizione dettagliata del requisito funzionale"
      priority: "MUST"
  technical_requirements:
    - id: "TR-001"
      category: "Hosting / Architettura / Sicurezza / Integrazione"
      description: "Descrizione del requisito tecnico"
      constraint: "Eventuale vincolo (opzionale)"
  sla:
    metrics:
      - metric: "Disponibilità"
        target: "99.9%"
        note: ""
    penalties: "Penali contrattuali applicabili in caso di mancato rispetto"
  security_compliance:
    standards:
      - "ISO 27001"
      - "GDPR"
    requirements:
      - "MFA obbligatorio"
      - "Crittografia AES-256"
    data_classification: "Confidenziale / Pubblico / Riservato"
  timeline:
    project_start: "YYYY-MM-DD"
    go_live: "YYYY-MM-DD"
    milestones: []
  integrations:
    - system: "Nome sistema"
      type: "API/DB/File"
      protocol: "REST/SOAP/..."
  stakeholders:
    - role: "CIO / PM / DPO"
      responsibilities: "Responsabilità principale"
  constraints:
    - "Vincolo normativo"
    - "Vincolo budgetario"
  regulatory_references:
    - code: "Es. GDPR, ISO 27001"
      description: "Normativa di riferimento"
  evaluation_criteria:
    - criterion: "Prezzo"
      weight: "30%"
    - criterion: "Qualità tecnica"
      weight: "70%"
  budget:
    indicative_value: "€ XXX.XXX"
    currency: "EUR"
    notes: ""

critical_fields:
  - "project.title"
  - "project.organization"
  - "scope.objectives"
  - "functional_requirements"
  - "technical_requirements"
  - "sla.metrics"
  - "security_compliance.standards"
  - "timeline.go_live"

flat_to_nested:
  project_name:
    - project
    - title
  budget_range:
    - budget
    - indicative_value
  timeline:
    - timeline
    - go_live

prompt_template: |
  Extract structured requirements from the user input below.
  Type: $document_type | Title: $title
  $clarifications_block
  === INPUT ===
  $raw_text
  === END INPUT ===

  Return ONLY valid JSON (no fences, no prose). Structure:
  {"project":{"title":"","organization":"","reference_code":null,"description":""},"scope":{"objectives":[],"in_scope":[],"out_of_scope":[]},"functional_requirements":[{"id":"FR-001","title":"","description":"","priority":"MUST"}],"technical_requirements":[{"id":"TR-001","category":"","description":"","constraint":""}],"sla":{"metrics":[{"metric":"","target":"","note":""}],"penalties":""},"security_compliance":{"standards":[],"requirements":[],"data_classification":null},"timeline":{"project_start":null,"go_live":null,"milestones":[]},"integrations":[],"stakeholders":[],"constraints":[],"regulatory_references":[],"evaluation_criteria":[],"budget":{"indicative_value":"","currency":"EUR","notes":""},"search_terms":[]}

  RULES: 1)Parse ALL sections 2)SLA table rows→sla.metrics[{metric,target}] 3)Min $min_fr FR with FR-001..FR-00N IDs 4)Min $min_tr TR with TR-001.. IDs 5)Unknown→null(string) or[](list) 6)search_terms: specific tech, max 10 7)NO fences, NO prose
